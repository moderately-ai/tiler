name: Documentation integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.11"
          enable-cache: true
      - run: sudo apt-get update
      - run: sudo apt-get install --no-install-recommends -y shellcheck
      - run: shellcheck deps.sh
      - run: uv run --locked ruff format --check
      - run: uv run --locked ruff check
      - run: uv run --locked pytest
      - run: uv run --locked python scripts/docs.py validate
